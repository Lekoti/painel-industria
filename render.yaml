services:
  # API + watcher (Node)
  - type: web
    name: painel-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true

  # Painel (site estatico gerado pelo Vite)
  - type: web
    name: painel-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      # URL publica do backend acima. Ajuste se renomear o servico.
      - key: VITE_API_URL
        value: https://painel-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
